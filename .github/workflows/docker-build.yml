name: Docker Generic Build & Push

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Descargar build generado
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build
      
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ inputs.image-name }}:latest
            ghcr.io/${{ inputs.image-name }}:${{ github.sha }}
